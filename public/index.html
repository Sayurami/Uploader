module.exports = async (req, res) => {
  // CORS
  res.setHeader("Access-Control-Allow-Origin", "*");
  res.setHeader("Access-Control-Allow-Methods", "GET, POST, DELETE, OPTIONS");
  res.setHeader("Access-Control-Allow-Headers", "Content-Type");
  if (req.method === "OPTIONS") return res.status(200).end();
  try {
    await connectDB();
    // ─── GET: සියලු sessions list ───
    if (req.method === "GET" && !req.query.action) {
      const sessions = await CredsModel.find({}, "sessionId updatedAt");
      return res.json({ success: true, sessions });
    }
    // ─── POST: නව session upload ───
    if (req.method === "POST") {
      const { credsJson, sessionId: customId } = req.body;
      if (!credsJson) {
        return res.status(400).json({ success: false, error: "credsJson is required" });
      }
      // creds.json valid දැයි check
      let parsedCreds;
      try {
        parsedCreds = typeof credsJson === "string" ? JSON.parse(credsJson) : credsJson;
        if (!parsedCreds.noiseKey && !parsedCreds.me && !parsedCreds.signedIdentityKey) {
          return res.status(400).json({ success: false, error: "Invalid creds.json format" });
        }
      } catch (e) {
        return res.status(400).json({ success: false, error: "Invalid JSON format" });
      }
      const sessionId = customId || generateSessionId();
      await CredsModel.findOneAndUpdate(
        { sessionId },
        { sessionId, credsJson: parsedCreds, updatedAt: new Date() },
        { upsert: true, new: true }
      );
      return res.json({ success: true, sessionId, message: "Session uploaded successfully!" });
    }
    // ─── DELETE: session delete ───
    if (req.method === "DELETE") {
      const { sessionId } = req.query;
      if (!sessionId) {
        return res.status(400).json({ success: false, error: "sessionId required" });
      }
      await CredsModel.deleteOne({ sessionId });
      return res.json({ success: true, message: Session ${sessionId} deleted });
    }
    return res.status(405).json({ error: "Method not allowed" });
  } catch (err) {
    console.error(err);
    return res.status(500).json({ success: false, error: err.message });
  }
};

<script>
const API = '/api/sessions';

// ── Toast ──
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3500);
}

// ── Load Sessions ──
async function loadSessions() {
  try {
    const res = await fetch(API);
    const data = await res.json();
    const list = document.getElementById('sessionsList');
    const badge = document.getElementById('countBadge');

    if (!data.sessions || data.sessions.length === 0) {
      list.innerHTML = '<div class="empty"><div class="e-icon">📭</div>No sessions yet. Upload your first creds.json!</div>';
      badge.textContent = '0';
      return;
    }

    badge.textContent = data.sessions.length;
    list.innerHTML = data.sessions.map(s => `
      <div class="session-item" id="session-${s.sessionId}">
        <div>
          <div class="session-id">🔑 ${s.sessionId}</div>
          <div class="session-date">Updated: ${new Date(s.updatedAt).toLocaleString()}</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <span class="session-badge">● Active</span>
          <button class="btn btn-danger" onclick="deleteSession('${s.sessionId}')">🗑 Delete</button>
        </div>
      </div>
    `).join('');
  } catch (err) {
    showToast('Failed to load sessions', 'error');
  }
}

// ── Upload Creds ──
async function uploadCreds(credsJson = null, customId = null) {
  const btn = document.getElementById('uploadBtn');

  if (!credsJson) {
    const raw = document.getElementById('credsTextarea').value.trim();
    if (!raw) { showToast('Please paste creds.json content or select a file', 'error'); return; }
    try { credsJson = JSON.parse(raw); } catch { showToast('Invalid JSON format!', 'error'); return; }
  }

  const sessionId = customId || document.getElementById('sessionIdInput').value.trim() || null;

  btn.disabled = true;
  btn.textContent = '⏳ Uploading...';

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ credsJson, sessionId })
    });
    const data = await res.json();

    if (data.success) {
      showToast(`✅ Uploaded! Session ID: ${data.sessionId}`, 'success');
      document.getElementById('credsTextarea').value = '';
      document.getElementById('sessionIdInput').value = '';
      loadSessions();
    } else {
      showToast(`❌ ${data.error}`, 'error');
    }
  } catch (err) {
    showToast('Upload failed. Check connection.', 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '⬆️ Upload to MongoDB';
  }
}

// ── Delete Session ──
async function deleteSession(sessionId) {
  if (!confirm(`Delete session: ${sessionId}?`)) return;
  try {
    const res = await fetch(`${API}?sessionId=${sessionId}`, { method: 'DELETE' });
    const data = await res.json();
    if (data.success) {
      showToast(`🗑 Deleted: ${sessionId}`, 'success');
      document.getElementById(`session-${sessionId}`)?.remove();
      loadSessions();
    }
  } catch { showToast('Delete failed', 'error'); }
}

// ── File Drop / Select ──
const dropArea = document.getElementById('dropArea');
const fileInput = document.getElementById('fileInput');

dropArea.addEventListener('dragover', e => { e.preventDefault(); dropArea.classList.add('drag-over'); });
dropArea.addEventListener('dragleave', () => dropArea.classList.remove('drag-over'));
dropArea.addEventListener('drop', e => {
  e.preventDefault();
  dropArea.classList.remove('drag-over');
  handleFiles(e.dataTransfer.files);
});

fileInput.addEventListener('change', e => handleFiles(e.target.files));

async function handleFiles(files) {
  if (!files || files.length === 0) return;

  // Multiple files support
  for (const file of files) {
    try {
      const text = await file.text();
      const json = JSON.parse(text);
      // File name ගෙන session id හදනවා (creds.json → auto id)
      const customId = files.length === 1
        ? document.getElementById('sessionIdInput').value.trim() || null
        : null;
      await uploadCreds(json, customId);
    } catch {
      showToast(`❌ Invalid JSON in file: ${file.name}`, 'error');
    }
  }
}

// ── Init ──
loadSessions();
</script>
