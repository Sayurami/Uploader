<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sayura MD - Session Manager</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #0a0a0f;
    color: #e2e8f0;
    font-family: 'Segoe UI', sans-serif;
    background-image: radial-gradient(ellipse at 20% 50%, #1a0533 0%, transparent 50%),
                      radial-gradient(ellipse at 80% 20%, #0d1f3c 0%, transparent 50%);
    overflow-x: hidden;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    padding: 50px 20px 30px;
  }
  .header .logo {
    font-size: 3rem;
    font-weight: 800;
    letter-spacing: -1px;
    background: linear-gradient(135deg, #a855f7, #3b82f6, #06b6d4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-transform: uppercase;
  }
  .header p {
    color: #64748b;
    margin-top: 10px;
    font-size: 1rem;
    font-weight: 500;
  }

  /* ── Container ── */
  .container {
    max-width: 850px;
    margin: 0 auto;
    padding: 0 20px 50px;
  }

  /* ── Card ── */
  .card {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 20px;
    padding: 30px;
    margin-bottom: 25px;
    backdrop-filter: blur(12px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }
  .card-title {
    font-size: 1.2rem;
    font-weight: 700;
    color: #a855f7;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* ── Upload Area ── */
  .upload-area {
    border: 2px dashed rgba(168, 85, 247, 0.3);
    border-radius: 15px;
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    background: rgba(168, 85, 247, 0.02);
  }
  .upload-area:hover, .upload-area.drag-over {
    border-color: #a855f7;
    background: rgba(168, 85, 247, 0.08);
    transform: scale(1.01);
  }
  .upload-area input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
  }
  .upload-icon { font-size: 3rem; margin-bottom: 15px; filter: drop-shadow(0 0 10px rgba(168, 85, 247, 0.5)); }
  .upload-area p { color: #94a3b8; font-size: 0.95rem; }
  .upload-area strong { color: #a855f7; }

  /* ── Divider ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 15px;
    margin: 25px 0;
    color: #475569;
    font-size: 0.85rem;
    font-weight: 600;
    text-transform: uppercase;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
  }

  /* ── Form Elements ── */
  .label { font-size: 0.85rem; color: #94a3b8; margin-bottom: 8px; font-weight: 600; display: block; }
  
  textarea {
    width: 100%;
    min-height: 150px;
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    padding: 15px;
    color: #e2e8f0;
    font-family: 'Fira Code', 'Courier New', monospace;
    font-size: 0.85rem;
    resize: vertical;
    outline: none;
    transition: border 0.3s;
  }
  textarea:focus { border-color: #a855f7; box-shadow: 0 0 15px rgba(168, 85, 247, 0.1); }

  input[type="text"] {
    width: 100%;
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    padding: 12px 15px;
    color: #e2e8f0;
    font-size: 0.9rem;
    outline: none;
    transition: border 0.3s;
    margin-bottom: 20px;
  }
  input[type="text"]:focus { border-color: #a855f7; }

  /* ── Buttons ── */
  .btn {
    padding: 14px 25px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    border: none;
    transition: all 0.3s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .btn-primary {
    background: linear-gradient(135deg, #a855f7, #7c3aed);
    color: white;
    width: 100%;
    box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
  }
  .btn-primary:hover { 
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(124, 58, 237, 0.4);
    filter: brightness(1.1);
  }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .btn-refresh {
    background: rgba(255,255,255,0.05);
    color: #94a3b8;
    padding: 8px 15px;
    font-size: 0.8rem;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .btn-refresh:hover { background: rgba(255,255,255,0.1); color: #fff; }

  /* ── Sessions List ── */
  .sessions-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .session-item {
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 15px;
    padding: 18px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: all 0.3s;
  }
  .session-item:hover {
    background: rgba(255, 255, 255, 0.04);
    border-color: rgba(168, 85, 247, 0.2);
  }
  .session-info { display: flex; flex-direction: column; gap: 4px; }
  .session-id {
    font-family: 'Fira Code', monospace;
    font-size: 0.95rem;
    color: #e2e8f0;
    font-weight: 600;
  }
  .session-date {
    font-size: 0.75rem;
    color: #64748b;
  }
  .session-status {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(34, 197, 94, 0.1);
    color: #4ade80;
    border: 1px solid rgba(34, 197, 94, 0.2);
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 700;
  }
  .status-dot { width: 8px; height: 8px; background: #4ade80; border-radius: 50%; box-shadow: 0 0 10px #4ade80; }

  /* ── Toast Notifications ── */
  .toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    padding: 16px 25px;
    border-radius: 12px;
    font-weight: 600;
    font-size: 0.95rem;
    z-index: 1000;
    transform: translateX(120%);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
  }
  .toast.show { transform: translateX(0); }
  .toast.success { background: #064e3b; border-left: 5px solid #10b981; color: #d1fae5; }
  .toast.error { background: #7f1d1d; border-left: 5px solid #ef4444; color: #fee2e2; }

  /* ── Empty State ── */
  .empty {
    text-align: center;
    padding: 40px;
    color: #475569;
  }
  .empty .e-icon { font-size: 3rem; margin-bottom: 15px; opacity: 0.5; }

  .count-badge {
    background: rgba(168, 85, 247, 0.15);
    color: #a855f7;
    border-radius: 30px;
    padding: 2px 12px;
    font-size: 0.85rem;
    font-weight: 800;
  }

</style>
</head>
<body>

<div class="header">
  <div class="logo">Sayura MD</div>
  <p>Cloud Session Storage — Powering Your WhatsApp Bot</p>
</div>

<div class="container">

  <div class="card">
    <div class="card-title"><span>🚀</span> New Deployment</div>

    <div class="upload-area" id="dropArea">
      <input type="file" accept=".json,application/json" id="fileInput"/>
      <div class="upload-icon">⚡</div>
      <p>Drop your <strong>creds.json</strong> here or <strong>Click to Browse</strong></p>
    </div>

    <div class="divider">Or Manual Input</div>

    <label class="label">JSON Credentials Data</label>
    <textarea id="credsTextarea" placeholder='Paste your creds.json content here...'></textarea>

    <label class="label">Custom Identifier (Optional)</label>
    <input type="text" id="sessionIdInput" placeholder="e.g. Sayura-Session-001"/>

    <button class="btn btn-primary" id="uploadBtn" onclick="uploadCreds()">
      <span>📤</span> DEPLOY SESSION TO CLOUD
    </button>
  </div>

  <div class="card">
    <div class="card-title">
      <div style="display:flex; align-items:center; gap:10px">
        <span>📋</span> Active Database
        <span class="count-badge" id="countBadge">0</span>
      </div>
      <button class="btn btn-refresh" onclick="loadSessions()">🔄 Sync</button>
    </div>
    
    <div class="sessions-grid" id="sessionsList">
      <div class="empty">
        <div class="e-icon">🛰️</div>
        <p>Connecting to database...</p>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const API = '/api/sessions';

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 4000);
}

// ── Sync Sessions from DB ──
async function loadSessions() {
  try {
    const res = await fetch(API);
    const data = await res.json();
    const list = document.getElementById('sessionsList');
    const badge = document.getElementById('countBadge');

    if (!data.sessions || data.sessions.length === 0) {
      list.innerHTML = '<div class="empty"><div class="e-icon">🌑</div><p>No active sessions found in orbit.</p></div>';
      badge.textContent = '0';
      return;
    }

    badge.textContent = data.sessions.length;
    list.innerHTML = data.sessions.map(s => `
      <div class="session-item">
        <div class="session-info">
          <div class="session-id">🔑 ${s.sessionId}</div>
          <div class="session-date">Last Synced: ${new Date(s.updatedAt).toLocaleString()}</div>
        </div>
        <div class="session-status">
          <div class="status-dot"></div>
          CONNECTED
        </div>
      </div>
    `).join('');
  } catch (err) {
    showToast('Failed to reach database', 'error');
  }
}

// ── Upload Handler ──
async function uploadCreds() {
  const btn = document.getElementById('uploadBtn');
  const raw = document.getElementById('credsTextarea').value.trim();
  const fileInput = document.getElementById('fileInput');
  
  let credsJson = null;

  // If text is pasted
  if (raw) {
    try { 
      credsJson = JSON.parse(raw); 
    } catch { 
      showToast('Invalid JSON structure! Check for missing brackets.', 'error'); 
      return; 
    }
  } 

  if (!credsJson) {
    showToast('Please provide a creds.json file or text data.', 'error');
    return;
  }

  const sessionId = document.getElementById('sessionIdInput').value.trim() || null;

  btn.disabled = true;
  btn.innerHTML = '<span>⏳</span> UPLOADING...';

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ credsJson, sessionId })
    });
    const data = await res.json();

    if (data.success) {
      showToast(`🚀 Successfully Deployed: ${data.sessionId}`, 'success');
      document.getElementById('credsTextarea').value = '';
      document.getElementById('sessionIdInput').value = '';
      loadSessions();
    } else {
      showToast(`❌ Error: ${data.error}`, 'error');
    }
  } catch (err) {
    showToast('Connection lost during upload.', 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<span>📤</span> DEPLOY SESSION TO CLOUD';
  }
}

// ── File Upload Logic ──
const fileInput = document.getElementById('fileInput');
fileInput.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  
  const text = await file.text();
  document.getElementById('credsTextarea').value = text;
  showToast('File loaded! Click Deploy to save.', 'success');
});

// Drag and drop support
const dropArea = document.getElementById('dropArea');
['dragenter', 'dragover'].forEach(e => {
  dropArea.addEventListener(e, (ev) => {
    ev.preventDefault();
    dropArea.classList.add('drag-over');
  });
});
['dragleave', 'drop'].forEach(e => {
  dropArea.addEventListener(e, (ev) => {
    ev.preventDefault();
    dropArea.classList.remove('drag-over');
    if (e === 'drop') {
      const file = ev.dataTransfer.files[0];
      if (file) {
        file.text().then(text => {
          document.getElementById('credsTextarea').value = text;
          showToast('File dropped successfully!', 'success');
        });
      }
    }
  });
});

// Initial load
loadSessions();
</script>
</body>
</html>
